<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Split Bills v3</title>
  </head>
  <body>
    <script src="./split-bills.js"></script>
    <script>
      window.ai_edge_gallery_get_result = async (data) => {
        try {
          const output = await window.SplitBillsV3.run(data);
          return JSON.stringify(output);
        } catch (e) {
          console.error(e);
          return JSON.stringify({
            error: e && e.message ? e.message : 'Unknown error'
          });
        }
      };
      window.run_js = window.ai_edge_gallery_get_result;
    </script>
  </body>
</html>
